version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-grading_appeal}_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-grading_appeal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-21607}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-grading_appeal}_redis
    ports:
      - "${REDIS_PORT:-22607}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
